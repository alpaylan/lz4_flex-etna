[[dropped]]
commit = "b078f7c"
subject = "Fix: Out of bounds write"
reason = "OOB write only observable under MemorySanitizer/AddressSanitizer; the over-allocated output Vec absorbs the buggy write under default cargo test, so no panic, no detectable behavior change without sanitizer infrastructure."

[[dropped]]
commit = "055502e"
subject = "fix handling of invalid match offsets during decompression"
reason = "Buggy safe-decode path silently produces wrong output (offset clamping + uninitialised-byte exposure) instead of erroring. Detecting requires either a known-good reference decoder for byte-for-byte comparison or MemorySanitizer; both are out of reach for the per-variant witness contract here."

[[dropped]]
commit = "2991a09"
subject = "fix get_maximum_output_size overflow on 32-bit targets"
reason = "Bug only triggers on 32-bit targets (input_len * 110 overflows usize when usize is 32-bit). x86_64 host of the etna workload cannot reproduce it."

[[dropped]]
commit = "c1483c4"
subject = "fix the issue (read_integer u32 -> usize)"
reason = "The buggy u32 accumulator only overflows when a single LZ4 literal/match length encoding spans more than 2^32 bytes, which the upstream block format caps below 64KB per block — unreachable in practice."
